<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>
<body>

<h1>My Notes</h1>

<form method="POST">
    <input type="text" name="note" placeholder="Enter a note">
    <button type="submit">Add</button>
</form>

<hr>

<h2>Saved Notes</h2>

<ul>
    {% for note in notes %}
        <li>
            {{ note[1] }}
            <form action="/delete/{{note[0]}}" method="POST"  style="display:inline;">
                <button type="submit">DELETE</button>
            </form>
        </li>
    {% endfor %}
</ul>

</body>
</html>
